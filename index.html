<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warming Up | Pole Dance</title>
    <style>
        :root {
            --bg-color: #0d0d11;
            --accent-glow: #ff2a74;
            --text-light: #ffffff;
            --text-muted: #8a8a93;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-light);
        }

        /* Ambient neon line representing the dance pole */
        .visual-pole {
            position: absolute;
            width: 2px;
            height: 100vh;
            background: linear-gradient(to bottom, transparent, var(--accent-glow), transparent);
            box-shadow: 0 0 20px var(--accent-glow), 0 0 40px var(--accent-glow);
            opacity: 0.3;
            z-index: 1;
        }

        .container {
            text-align: center;
            z-index: 2;
            padding: 20px;
        }

        .status-tag {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--accent-glow);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .instructor-title {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        /* Pulsing animation for loading dots */
        .pulse-dots {
            display: inline-flex;
            gap: 6px;
            align-items: center;
            vertical-align: middle;
            margin-left: 8px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-light);
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        .subtext {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Responsive styling for mobile screens */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .instructor-title { font-size: 1rem; margin-bottom: 1.5rem; }
            .status-tag { font-size: 0.75rem; }
            .subtext { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <!-- Visual pole element -->
    <div class="visual-pole"></div>

    <div class="container">
        <p class="status-tag">Session Intro</p>
        <h1>Warming Up<div class="pulse-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></h1>
        <p class="instructor-title">with Rebeca Sanchez</p>
        <p class="subtext">Joint mobilization & core activation. Starting shortly.</p>
    </div>

</body>
</html>
